<!doctype html>
<html lang="th">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>chutcenter · สร้างชุดข้อสอบ</title>
    <style>
      /* skeleton styling only — visual design comes later */
      * { box-sizing: border-box; }
      body { font-family: system-ui, "TH Sarabun New", sans-serif; margin: 0; padding: 20px; color: #1a1a1a; max-width: 820px; }
      h1 { font-size: 20px; margin: 0 0 4px; }
      .sub { color: #666; margin: 0 0 16px; font-size: 14px; }
      .filters { display: grid; gap: 12px; margin-bottom: 12px; }
      .row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
      label { min-width: 84px; font-size: 14px; }
      select { font-size: 15px; padding: 6px 8px; max-width: 100%; }
      #count { font-size: 18px; font-weight: bold; margin: 10px 0; min-height: 1.4em; }
      button { font-size: 16px; padding: 11px 18px; border: 0; border-radius: 8px; background: #2a6f2a; color: #fff; cursor: pointer; }
      button:disabled { background: #999; cursor: default; }
      #dl { display: none; font-size: 15px; }
      /* busy line: spinner + message */
      #busy { display: flex; align-items: center; gap: 8px; margin: 10px 0; font-size: 14px; color: #444; min-height: 1.3em; }
      #spinner { width: 15px; height: 15px; border: 2px solid #cfcfcf; border-top-color: #2a6f2a; border-radius: 50%; animation: spin 0.7s linear infinite; display: none; flex: none; }
      #busy.on #spinner { display: inline-block; }
      @keyframes spin { to { transform: rotate(360deg); } }
      #note { font-size: 12.5px; color: #888; margin: 2px 0 0; }
      #view { width: 100%; height: 76vh; border: 1px solid #ddd; border-radius: 8px; margin-top: 12px; background: #fafafa; display: none; }
      /* mobile: stack label above control, controls go full width (functional, not decorative) */
      @media (max-width: 480px) {
        body { padding: 14px; }
        .row { gap: 6px; }
        label { min-width: 0; width: 100%; font-weight: 600; }
        select { flex: 1 1 auto; min-width: 0; }
        #go { width: 100%; }
        #view { height: 70vh; }
      }
    </style>
  </head>
  <body>
    <h1>chutcenter · สร้างชุดข้อสอบ</h1>
    <p class="sub">เลือกเรื่อง / แหล่งที่มา / ช่วงปี → สร้างเป็น PDF สดในเบราว์เซอร์ (ฟอนต์ฝัง เปิด/พิมพ์ได้ทุกที่)</p>

    <div class="filters">
      <div class="row"><label for="topic">เรื่อง</label><select id="topic"></select></div>
      <div class="row"><label for="source">แหล่งที่มา</label><select id="source"></select></div>
      <div class="row">
        <label for="yearFrom">ช่วงปี พ.ศ.</label>
        <select id="yearFrom"></select>
        <span>ถึง</span>
        <select id="yearTo"></select>
      </div>
    </div>

    <div id="count">กำลังโหลดคลังข้อสอบ…</div>
    <div class="row">
      <button id="go" disabled>สร้างชุดข้อสอบ (PDF)</button>
      <a id="dl" download>⬇ ดาวน์โหลด PDF</a>
    </div>
    <div id="busy"><span id="spinner"></span><span id="status"></span></div>
    <p id="note"></p>
    <iframe id="view" title="ตัวอย่าง PDF"></iframe>

    <script type="module" src="/main.js"></script>
  </body>
</html>
