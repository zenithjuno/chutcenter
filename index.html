<!doctype html>
<html lang="th">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>chutcenter · เลือกข้อสอบ</title>
    <style>
      /* skeleton styling only — visual design comes later */
      body { font-family: system-ui, "TH Sarabun New", sans-serif; margin: 0; padding: 24px; color: #1a1a1a; max-width: 720px; }
      h1 { font-size: 20px; margin: 0 0 4px; }
      .sub { color: #666; margin: 0 0 20px; font-size: 14px; }
      .filters { display: grid; gap: 12px; margin-bottom: 16px; }
      .row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
      label { min-width: 84px; font-size: 14px; }
      select { font-size: 15px; padding: 6px 8px; }
      #count { font-size: 18px; font-weight: bold; margin: 12px 0; min-height: 1.4em; }
      button { font-size: 16px; padding: 10px 18px; border: 0; border-radius: 8px; background: #2a6f2a; color: #fff; cursor: pointer; }
      button:disabled { background: #999; cursor: default; }
      #results { margin-top: 16px; font-size: 14px; border-top: 1px solid #ddd; padding-top: 12px; }
      #results table { border-collapse: collapse; width: 100%; }
      #results td, #results th { border: 1px solid #e0e0e0; padding: 4px 8px; text-align: left; }
    </style>
  </head>
  <body>
    <h1>chutcenter · เลือกข้อสอบ</h1>
    <p class="sub">Stage 8 — เลือกเรื่อง / แหล่งที่มา / ช่วงปี แล้วดูจำนวนข้อที่พบ (นับสดจากคลังจริง)</p>

    <div class="filters">
      <div class="row"><label for="topic">เรื่อง</label><select id="topic"></select></div>
      <div class="row"><label for="source">แหล่งที่มา</label><select id="source"></select></div>
      <div class="row">
        <label for="yearFrom">ช่วงปี พ.ศ.</label>
        <select id="yearFrom"></select>
        <span>ถึง</span>
        <select id="yearTo"></select>
      </div>
    </div>

    <div id="count">กำลังโหลดคลังข้อสอบ…</div>
    <button id="go" disabled>สร้างชุดข้อสอบ</button>
    <div id="results"></div>

    <script type="module" src="/main.js"></script>
  </body>
</html>
